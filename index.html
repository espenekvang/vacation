<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sommerferie 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --card: rgba(255, 255, 255, 0.92);
      --text: #1f2933;
      --muted: #5b6470;
      --shadow: 0 18px 40px rgba(31, 41, 51, 0.18);
      --shadow-hover: 0 26px 60px rgba(31, 41, 51, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      line-height: 1.55;
      /* animated tropical sunset gradient */
      background: linear-gradient(-45deg, #ff9a3c, #ff6f91, #845ec2, #2c73d2, #00c9a7);
      background-size: 400% 400%;
      animation: drift 22s ease infinite;
    }

    @keyframes drift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    header {
      text-align: center;
      padding: 3.5rem 1rem 1.5rem;
      color: #fff;
    }

    header h1 {
      margin: 0;
      font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 800;
      font-size: clamp(2.4rem, 7vw, 4rem);
      letter-spacing: 0.5px;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
    }

    header p {
      margin: 0.6rem 0 0;
      font-size: 1.15rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .destinations {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.25rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.1rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.18);
      transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .badge:hover { transform: translateY(-3px) scale(1.04); }

    .badge .flag { font-size: 1.2rem; }

    .badge .arrow {
      color: rgba(255, 255, 255, 0.95);
      font-size: 1.4rem;
      align-self: center;
    }

    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 1.5rem 1rem 5rem;
      display: grid;
      gap: 2rem;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(6px);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.35s ease;
      /* entrance animation */
      opacity: 0;
      transform: translateY(28px);
      animation: rise 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.012);
      box-shadow: var(--shadow-hover);
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .card video {
      display: block;
      width: 100%;
      max-height: 70vh;
      background: #000;
    }

    .card-body {
      padding: 1.1rem 1.4rem 1.5rem;
    }

    .card-body h2 {
      margin: 0 0 0.35rem;
      font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-body h2 .dot {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 50%;
      flex: none;
      background: linear-gradient(135deg, #ff6f91, #ff9a3c);
    }

    .card-body p {
      margin: 0;
      color: var(--muted);
      font-size: 1.02rem;
    }

    footer {
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0 1rem 2.5rem;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    @media (prefers-reduced-motion: reduce) {
      body, .card { animation: none; }
      .card { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Sommerferie 2026</h1>
    <p>Japan &amp; Bali</p>
    <div class="destinations">
      <span class="badge"><span class="flag">🇯🇵</span> Japan ⛩️</span>
      <span class="arrow">✈️</span>
      <span class="badge"><span class="flag">🇮🇩</span> Bali 🏝️</span>
    </div>
  </header>

  <main id="gallery"></main>

  <script>
    // ─────────────────────────────────────────────────────────────
    // Add your videos here. To get a `url`, open the video in Google
    // Photos in a desktop browser, then copy the direct
    // lh3.googleusercontent.com/... media URL ending in "=dv".
    // (Plain photos.app.goo.gl share links won't embed.)
    // ─────────────────────────────────────────────────────────────
    const videos = [
      {
        url: "https://photos.app.goo.gl/JFHVUrtabgu85hwV7",
        title: "Røverkollen",
        description: "Morgentur til Røverkollen"
      }
      // , {
      //   url: "https://lh3.googleusercontent.com/REPLACE_ME/=dv",
      //   title: "Day 2 – The beach",
      //   description: "Another short note."
      // }
    ];

    const gallery = document.getElementById("gallery");

    videos.forEach((v, i) => {
      const card = document.createElement("section");
      card.className = "card";
      // stagger the entrance so cards cascade in
      card.style.animationDelay = (i * 0.12) + "s";

      const video = document.createElement("video");
      video.src = v.url;
      video.controls = true;
      video.preload = "metadata";
      video.playsInline = true;

      const body = document.createElement("div");
      body.className = "card-body";

      const h2 = document.createElement("h2");
      const dot = document.createElement("span");
      dot.className = "dot";
      const titleText = document.createElement("span");
      titleText.textContent = v.title;
      h2.append(dot, titleText);

      const p = document.createElement("p");
      p.textContent = v.description;

      body.append(h2, p);
      card.append(video, body);
      gallery.append(card);
    });
  </script>
</body>
</html>
